name: CI

on:
    workflow_dispatch:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

# No special permissions defined before we need them
permissions:
    contents: read

env:
    PYTHON_VERSIONS: "['3.12', '3.13', '3.14']"

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    # It is not possible to pass an environment variable down to
    # a reusable workflow as an argument via _with_.
    # See: https://stackoverflow.com/a/73305536
    # The workaround is to put the environment variable as a step output.
    python_versions:
        name: Set Python versions
        runs-on: ubuntu-latest
        outputs:
            python_versions: ${{ steps.step1.outputs.python_versions }}
        steps:
            - id: step1
              run: echo "python_versions=$PYTHON_VERSIONS" >> "$GITHUB_OUTPUT"

    test:
        needs: python_versions
        strategy:
            matrix:
                python_version: ${{ fromJSON(needs.python_versions.outputs.python_versions) }}

        name: Test - python v${{ matrix.python_version }}
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                persist-credentials: false

            - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
              with:
                  python-version: ${{ matrix.python_version }}

            - uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0
              with:
                  version-file: "pyproject.toml"
                  python-version: ${{ matrix.python_version }}

            - name: Run tests
              run: |
                  uv run --frozen -- pytest --cov=src/ --cov-config=pyproject.toml --numprocesses=auto -m 'not end_to_end and not legacy'

    lint-python:
        name: Lint Python
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                persist-credentials: false

            - uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0
              with:
                  version-file: "pyproject.toml"

            - name: Run tests
              run: |
                  uv run --frozen -- ruff check --output-format=github

    # We are running both actionlint and zizmor because they have many non-overlapping checks
    # actionlint is focused on correctness (syntax, types, action inputs, shellcheck)
    # zizmor is focused on security (permissions, pinning, dangerous triggers, injection)
    lint-actions:
        name: Lint GH Actions
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 
              with:
                persist-credentials: false
            
            - name: Run actionlint
              run: |
                bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.11
                ./actionlint -color


            - uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0
              with:
                  version-file: "pyproject.toml"

            - name: Run zizmor
              run: uvx zizmor ./.github/ --format github --pedantic --offline

    format:
        name: Format
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                persist-credentials: false

            - uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0
              with:
                  version-file: "pyproject.toml"

            - name: Run tests
              run: |
                  uv run --frozen -- ruff format --check

    type_check:
        name: Type check
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                persist-credentials: false

            - uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0
              with:
                  version-file: "pyproject.toml"

            - name: Run tests
              run: |
                  uv run --frozen -- ty check --output-format=github

    spell_check:
        name: Spell check
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                persist-credentials: false

            - run: npm install -g cspell

            - name: Check spelling
              run: cspell lint --no-progress --config ./cspell.json &>> "$GITHUB_STEP_SUMMARY"

    smoke_test:
        needs: python_versions
        strategy:
            matrix:
                python_version: ${{ fromJSON(needs.python_versions.outputs.python_versions) }}

        name: Smoke test - Python v${{ matrix.python_version }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                persist-credentials: false
            - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
              with:
                  python-version: ${{ matrix.python_version }}
            - uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0
              with:
                  version-file: "pyproject.toml"

            - name: Install extension
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh extension install .
            - name: Verify extension runs
              run: gh tt --help

    should-run-e2e-tests:
        runs-on: ubuntu-latest
        name: Check changed paths
        permissions:
            contents: read
            pull-requests: read # Reading files changed in the pull request
        outputs:
            changed: ${{ steps.filter.outputs.changed }}
        steps:
            - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
              id: filter
              with:
                filters: |
                    changed:
                        - 'src/gh_tt/**'
                        - 'tests/**'
                        - '.github/workflows/ci.yml'

    test_e2e:
        needs: [smoke_test, should-run-e2e-tests]

        name: Test E2E
        runs-on: ubuntu-latest
        if: ${{ needs.should-run-e2e-tests.outputs.changed == 'true' }}

        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                persist-credentials: false
            - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
              with:
                  python-version-file: ".python-version"
            - uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0
              with:
                  # Latest uv compliant with the project's tool.uv required version
                  version-file: "pyproject.toml"

            - name: Generate GitHub App installation token
              uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
              id: app-token
              with:
                  app-id: ${{ vars.QA_RUNNER_APP_ID }}
                  private-key: ${{ secrets.QA_RUNNER_PRIVATE_KEY }}
                  owner: gh-tt-qa
                  permission-organization-projects: admin
                  permission-administration: write
                  permission-issues: write
                  permission-contents: write
                  permission-pull-requests: write

            - name: Install gh-tt extension
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                  gh extension install .

            - name: Get GitHub App User ID
              id: get-user-id
              run: echo "user-id=$(gh api "/users/${STEPS_APP_TOKEN_OUTPUTS_APP_SLUG}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
                  STEPS_APP_TOKEN_OUTPUTS_APP_SLUG: ${{ steps.app-token.outputs.app-slug }}

            - name: Configure Git
              run: |
                  git config --global user.name "${STEPS_APP_TOKEN_OUTPUTS_APP_SLUG}[bot]"
                  git config --global user.email "${STEPS_GET_USER_ID_OUTPUTS_USER_ID}+${STEPS_APP_TOKEN_OUTPUTS_APP_SLUG}[bot]@users.noreply.github.com"
                  git config --global url."https://x-access-token:${STEPS_APP_TOKEN_OUTPUTS_TOKEN}@github.com/".insteadOf 'https://github.com/'
              env:
                STEPS_APP_TOKEN_OUTPUTS_APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
                STEPS_GET_USER_ID_OUTPUTS_USER_ID: ${{ steps.get-user-id.outputs.user-id }}
                STEPS_APP_TOKEN_OUTPUTS_TOKEN: ${{ steps.app-token.outputs.token }}

            - name: Run end to end tests
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
                  QA_ORGANIZATION_ID: ${{ vars.QA_ORG_ID }}
              run: |
                  uv run --frozen -- pytest --numprocesses=auto -m end_to_end

    check: # This job acts as 'the mother of all jobs' and is the only required check to enter main
        name: ✅ All required checks passed
        runs-on: ubuntu-latest
        timeout-minutes: 1
        if: always()
        needs:
            - lint-python
            - lint-actions
            - format
            - type_check
            - spell_check
            - test_e2e
            - smoke_test
            - test

        steps:
            - name: Decide whether the needed jobs succeeded or failed
              uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
              with:
                  jobs: ${{ toJSON(needs) }}
